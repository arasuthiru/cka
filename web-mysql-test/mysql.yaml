apiVersion: v1
kind: Pod
metadata:  
  labels:
    name: mysql1
  name: mysql1
  namespace: alpha
spec:
  containers:
  - env:
    - name: MYSQL_ROOT_PASSWORD
      value: paswrd
    image: mysql:5.6
    imagePullPolicy: IfNotPresent
    name: mysql1
    ports:
    - containerPort: 3306
      protocol: TCP
    resources: {}